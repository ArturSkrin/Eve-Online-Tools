services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: eve
      POSTGRES_PASSWORD: eve_secret_password
      POSTGRES_DB: eve_analyzer
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eve -d eve_analyzer"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "5000"
      DATABASE_URL: postgresql://eve:eve_secret_password@db:5432/eve_analyzer
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:5000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  pgdata:
